<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600&family=Playfair+Display:ital,wght@0,400;0,500;0,600&family=DM+Sans:ital,wght@0,300;0,400&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1a2e1f;
    --cream: #faf6f0;
    --moss: #3d6b4e;
    --aged-gold: #b5955a;
    --warm-stone: #e8dfd4;
  }
  body { margin: 0; padding: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
  
  /* Exact Dimensions of the visible desktop banner crop */
  .banner {
    width: 961px;
    height: 254px;
    background: #050505;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  
  .bg-image {
    position: absolute;
    top: -50%; left: 0; right: 0; bottom: -50%;
    width: 100%;
    height: 200%;
    object-fit: cover;
    object-position: center 30%;
    opacity: 0.35; /* Heavy darkening to make it moody and cinematic */
    filter: contrast(1.2) brightness(0.7);
    z-index: 1;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    margin-top: 10px;
  }

  .top-branding {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .site-logo {
    height: 24px;
    width: auto;
    object-fit: contain;
  }

  .company-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--warm-stone);
    letter-spacing: 6px;
    text-transform: uppercase;
    font-weight: 300;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    color: var(--cream);
    margin: 0 0 15px 0;
    line-height: 1;
    font-weight: 400;
    text-shadow: 0 10px 30px rgba(0,0,0,0.8);
  }

  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, rgba(181,149,90,0) 0%, rgba(181,149,90,1) 50%, rgba(181,149,90,0) 100%);
    margin: 0 0 15px 0;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--warm-stone);
    font-style: italic;
    letter-spacing: 1px;
    margin: 0;
  }

</style>
</head>
<body>
  <div class="banner" id="banner">
    <!-- Cinematic Dark Background -->
    <img src="../src/images/ranch_horses_full.jpg" class="bg-image" alt="Background" />
    
    <div class="content">
      <div class="top-branding">
        <img src="../src/images/logo.png" class="site-logo" alt="Logo" />
        <div class="company-name">EVOLUTION HORSEMANSHIP</div>
      </div>

      
      <h1>The Official<br>Community</h1>
      
      <div class="divider"></div>
      
      <p class="subtitle">A bold international gathering for those who put the horse first.</p>
    </div>
  </div>
</body>
</html>
